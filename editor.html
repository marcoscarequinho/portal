<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel de edição — Cais</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-bar container">
      <a href="index.html" class="logo">Ca<span>i</span>s</a>
      <span style="font-weight:700;color:var(--text-muted);font-size:0.9rem;">Painel de edição</span>
      <div class="header-actions">
        <a href="admin.html" class="icon-btn" id="link-admin" title="Gestão de editores" style="display:none;">👤</a>
        <button type="button" class="icon-btn dark-toggle" title="Alternar modo escuro">🌙</button>
        <span id="user-info" style="font-size:0.85rem;color:var(--text-muted);"></span>
        <button type="button" class="btn btn-secondary" id="btn-logout" style="padding:6px 12px;">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="editor-toolbar-top">
      <span class="editor-save-msg" id="permissao-aviso"></span>
      <div class="field" style="min-width:240px;max-width:340px;">
        <label for="carregar-existente">Editar notícia existente</label>
        <select id="carregar-existente">
          <option value="">— Nova notícia —</option>
        </select>
      </div>
    </div>

    <div class="editor-layout">
      <section>
        <form id="editor-form">
          <div class="editor-card">
            <h2>Identificação</h2>
            <div class="field-row">
              <div class="field">
                <label for="f-slug">Slug (URL)</label>
                <input type="text" id="f-slug" placeholder="ex: nova-materia-baixada" required />
              </div>
              <div class="field">
                <label for="f-editoria">Editoria</label>
                <select id="f-editoria" required></select>
              </div>
              <div class="field">
                <label for="f-imagem">Cor de fallback (sem imagem)</label>
                <select id="f-imagem">
                  <option value="teal">Petróleo</option>
                  <option value="laranja">Laranja queimado</option>
                  <option value="verde">Verde escuro</option>
                  <option value="ouro">Ouro</option>
                  <option value="azul">Azul</option>
                </select>
                <span class="editor-save-msg" id="fallback-hint"></span>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-titulo">Título</label>
                <input type="text" id="f-titulo" required />
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-linha">Linha fina (subtítulo)</label>
                <textarea id="f-linha" required></textarea>
              </div>
            </div>
            <div class="field-row">
              <div class="field" style="max-width:160px;">
                <label for="f-tempo">Tempo de leitura (min)</label>
                <input type="number" id="f-tempo" min="1" max="30" value="3" />
              </div>
              <div class="field field-check" style="max-width:200px;">
                <input type="checkbox" id="f-destaque" />
                <label for="f-destaque">Destaque (hero da home)</label>
              </div>
            </div>
          </div>

          <div class="editor-card">
            <h2>Imagem e vídeo</h2>
            <div class="field-row">
              <div class="field">
                <label for="f-imagem-upload">Imagem de destaque (JPG, PNG, WEBP ou GIF, até 5MB)</label>
                <input type="file" id="f-imagem-upload" accept="image/jpeg,image/png,image/webp,image/gif" />
                <span class="editor-save-msg" id="upload-msg"></span>
              </div>
              <div class="field" style="max-width:220px;">
                <div id="upload-preview" style="display:none;">
                  <img id="upload-preview-img" style="width:100%;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" />
                  <button type="button" class="btn btn-secondary" id="btn-remover-imagem" style="margin-top:6px;padding:6px 10px;font-size:0.8rem;">Remover imagem</button>
                </div>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="f-video">Link de vídeo (YouTube ou Vimeo, opcional)</label>
                <input type="url" id="f-video" placeholder="https://www.youtube.com/watch?v=..." />
              </div>
            </div>
          </div>

          <div class="editor-card">
            <h2>Resumo em 30 segundos</h2>
            <div class="dynlist" id="lista-resumo30s"></div>
            <button type="button" class="btn btn-secondary dynlist-add" data-add="resumo30s">+ Adicionar item</button>
          </div>

          <div class="editor-card">
            <h2>Corpo da matéria</h2>
            <div class="rte-toolbar" id="rte-toolbar">
              <button type="button" data-cmd="bold" title="Negrito"><b>B</b></button>
              <button type="button" data-cmd="italic" title="Itálico"><i>I</i></button>
              <button type="button" data-cmd="formatBlock" data-value="h2" title="Subtítulo">H2</button>
              <button type="button" data-cmd="formatBlock" data-value="p" title="Parágrafo">¶</button>
              <button type="button" data-cmd="insertUnorderedList" title="Lista">•</button>
              <button type="button" data-cmd="insertOrderedList" title="Lista numerada">1.</button>
              <button type="button" data-cmd="createLink" title="Link">🔗</button>
              <button type="button" data-cmd="undo" title="Desfazer">↺</button>
              <button type="button" data-cmd="redo" title="Refazer">↻</button>
            </div>
            <div class="rte-editor" id="rte-editor" contenteditable="true"><p>Escreva o corpo da matéria aqui...</p></div>
          </div>

          <div class="editor-card">
            <h2>Fontes (transparência)</h2>
            <div class="dynlist" id="lista-fontes"></div>
            <button type="button" class="btn btn-secondary dynlist-add" data-add="fontes">+ Adicionar fonte</button>
          </div>

          <div class="editor-actions">
            <button type="submit" class="btn" id="btn-salvar">Publicar notícia</button>
            <button type="button" class="btn btn-secondary" id="btn-novo">Limpar / nova notícia</button>
            <span class="editor-save-msg" id="editor-save-msg"></span>
          </div>
        </form>
      </section>

      <section class="editor-preview-col">
        <div class="section-title"><h2>Pré-visualização ao vivo</h2></div>
        <div class="editor-preview-frame">
          <div class="article-header" id="prev-header"></div>
          <div class="resumo30s" id="prev-resumo"></div>
          <div class="article-media" id="prev-media"></div>
          <div id="prev-video"></div>
          <div class="article-body" id="prev-corpo"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/video.js"></script>
  <script src="assets/js/editor.js"></script>
</body>
</html>
